<!DOCTYPE html>
<html>

<body>
    <canvas id="canvas"></canvas>
    <div id="results"></div>
    <script>
        const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkle-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#bg-gradient)"/>
  <path d="M160 140 L160 372 L320 372 L320 332 L208 332 L208 276 L296 276 L296 236 L208 236 L208 180 L320 180 L320 140 Z" fill="url(#sparkle-gradient)" stroke="none"/>
  <path d="M360 120 L368 140 L388 148 L368 156 L360 176 L352 156 L332 148 L352 140 Z" fill="#ffffff" opacity="0.9"/>
  <path d="M380 200 L384 210 L394 214 L384 218 L380 228 L376 218 L366 214 L376 210 Z" fill="#ffffff" opacity="0.7"/>
</svg>`;
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        const results = {};

        async function convert() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            const img = new Image();
            const blob = new Blob([svgString], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);

            await new Promise((resolve) => {
                img.onload = resolve;
                img.src = url;
            });

            for (const size of sizes) {
                canvas.width = size;
                canvas.height = size;
                ctx.clearRect(0, 0, size, size);
                ctx.drawImage(img, 0, 0, size, size);
                results[size] = canvas.toDataURL('image/png').split(',')[1];
            }

            document.getElementById('results').innerText = JSON.stringify(results);
        }
        convert();
    </script>
</body>

</html>
